baseURL = "https://scandinavianlorepod.com/"
languageCode = "en-US"
title = "Scandinavian Lore"
theme = "scandinavian-lore"
buildFuture = true
enableRobotsTXT = true
outputFormats.RSS.mediatype = "application/rss+xml"

[outputs]
  home = ["HTML", "RSS"]

[params]
  author = "Marcus Hermansson"
  description = "A narrative deep-dive podcast about Norse mythology, Scandinavian folklore, and the cultural heritage of the North."
  keywords = "Norse mythology, Scandinavian folklore, podcast, Yggdrasil, Eddas"
  
  # Podcast metadata
  podcastTitle = "Scandinavian Lore Pod"
  podcastDescription = "A narrative deep-dive into Norse mythology, broader Scandinavian folklore, including Finnish, Sámi, and regional Nordic traditions."
  podcastAuthor = "Marcus Hermansson"
  podcastImage = "images/podcast-cover.jpg"
  podcastCategory = "History"
  podcastSubCategory = ""
  podcastExplicit = "false"
  podcastLanguage = "en-us"
  podcastEmail = "hello@scandinavianlorepod.com"

  # Social links
  [params.social]
    spotify = "https://open.spotify.com/show/0UfNJ2DoIfIveU2hghm1Io"
    apple = "https://podcasts.apple.com/us/podcast/scandinavian-lore/id1234567890"  # TODO: replace with real Apple Podcasts URL
    twitter = "@ScandLorePod"
    # youtube = "https://www.youtube.com/@ScandinavianLorePod"  # TODO: set up channel

  # Patreon
  patreonURL = "https://www.patreon.com"

  # Testimonial (homepage + about page)
  testimonial = "This is the Norse mythology podcast I've been waiting for. Deep, respectful, and beautifully told — like sitting by the fire with a scholar who's also a born storyteller."
  testimonialAuthor = "A Listener"
  testimonialSource = "via Apple Podcasts"
    
  # Theme colors (warm/earthy palette)
  [params.colors]
    primary = "#3d2817"      # Dark brown
    secondary = "#8b6f47"    # Warm tan
    accent = "#c4a57b"       # Light sand
    background = "#f5f1e8"   # Cream
    text = "#2c2416"         # Dark charcoal

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
